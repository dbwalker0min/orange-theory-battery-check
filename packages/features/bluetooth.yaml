esp32_ble_tracker:
  id: ble_tracker

ble_client:
  - mac_address: "${bp_monitor_mac}"
    id: bp_monitor
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to Blood Pressure Monitor"
    on_disconnect:
      then:
        - logger.log: "Disconnected from Blood Pressure Monitor"
        
text_sensor:
  - platform: template
    name: "BP Reading"
    id: bp_reading
    icon: mdi:heart-pulse

  - platform: ble_client
    ble_client_id: bp_monitor
    id: bp_raw_ble
    internal: true
    service_uuid: ${bp_monitor_service_uuid}
    characteristic_uuid: ${bp_monitor_characteristic_uuid}
    notify: true
    update_interval: never
    on_notify:
      then:
        # This parses the blood pressure reading from the raw BLE data.
        - lambda: |-
            const auto &d = x;

            // Final packet: FD FD FC ss dd pulse 0D 0A
            if (d.size() == 8 &&
                (uint8_t)d[0] == 0xFD &&
                (uint8_t)d[1] == 0xFD &&
                (uint8_t)d[2] == 0xFC &&
                (uint8_t)d[6] == 0x0D &&
                (uint8_t)d[7] == 0x0A) {

              uint8_t sys = d[3];
              uint8_t dia = d[4];
              uint8_t hr = d[5];

              id(systolic).publish_state(sys);
              id(diastolic).publish_state(dia);
              id(pulse).publish_state(hr);

              // Update the reading count to trigger automations.
              id(reading_count) += 1;
              id(reading_count_sensor).publish_state(id(reading_count));

              uint8_t buf[32];
              snprintf((char*)buf, sizeof(buf), "%u/%u,%u,%u", sys, dia, hr, id(reading_count));
              id(bp_reading).publish_state((char*)buf);
              ESP_LOGI("bp_monitor", "BP: %u/%u, %u bpm", sys, dia, hr);
            }
    
globals:
  - id: reading_count
    type: uint32_t
    restore_value: true
    initial_value: '0'

sensor:
  - platform: template
    name: "Systolic Pressure"
    id: systolic
    accuracy_decimals: 0
    icon: mdi:heart-pulse

  - platform: template
    name: "Diastolic Pressure"
    id: diastolic
    accuracy_decimals: 0
    icon: mdi:heart-pulse

  - platform: template
    name: "Pulse"
    id: pulse
    unit_of_measurement: "bpm"
    accuracy_decimals: 0
    icon: mdi:heart-pulse

  - platform: template
    name: "Reading Count"
    id: reading_count_sensor
    unit_of_measurement: "readings"
    accuracy_decimals: 0
    icon: mdi:counter
    